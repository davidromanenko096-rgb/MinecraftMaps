<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Clone</title>

    <style>
        html,body{
            margin:0;
            overflow:hidden;
            background:#87CEEB;
        }

        canvas{
            display:block;
        }

        #crosshair{
            position:absolute;
            left:50%;
            top:50%;
            width:18px;
            height:18px;
            margin-left:-9px;
            margin-top:-9px;
            pointer-events:none;
        }

        #crosshair::before,
        #crosshair::after{
            content:"";
            position:absolute;
            background:white;
        }

        #crosshair::before{
            width:2px;
            height:18px;
            left:8px;
        }

        #crosshair::after{
            width:18px;
            height:2px;
            top:8px;
        }

        #hotbar{
            position:absolute;
            bottom:20px;
            left:50%;
            transform:translateX(-50%);
            display:flex;
            gap:8px;
        }

        .slot{
            width:50px;
            height:50px;
            border:2px solid white;
            background:rgba(0,0,0,.4);
        }
    </style>
</head>

<body>

<div id="crosshair"></div>

<div id="hotbar">
    <div class="slot"></div>
    <div class="slot"></div>
    <div class="slot"></div>
    <div class="slot"></div>
    <div class="slot"></div>
    <div class="slot"></div>
    <div class="slot"></div>
    <div class="slot"></div>
    <div class="slot"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.167.1/build/three.min.js"></script>
<script src="main.js"></script>

</body>
</html>
